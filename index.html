<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Jarvis</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<meta name="theme-color" content="#05070d">
<style>
:root{
  --theme:#2fb8ff;
  --violet:#7c3aed;
  --bg:#05070d;
  --panel:#0b0f1a;
  --text:#e8f1ff;
  --muted:#7a8699;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;width:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.hidden{display:none !important;}
#boot-screen,#activation-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 40%, #0d1526 0%, #05070d 70%);
  transition:opacity .6s ease;z-index:100;
}
.brand-title{
  font-family:'Courier New',monospace;font-size:clamp(2.2rem,8vw,4.6rem);font-weight:700;
  letter-spacing:.32em;background:linear-gradient(90deg,var(--theme),var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;text-transform:uppercase;text-align:center;
}
.brand-line{width:min(70vw,480px);height:2px;margin:22px 0;background:linear-gradient(90deg,transparent,var(--theme),var(--violet),transparent);}
.sync-text{letter-spacing:.2em;color:var(--muted);font-size:.82rem;animation:blink 1.2s infinite;}
.version-tag{position:absolute;bottom:22px;font-size:.68rem;letter-spacing:.15em;color:var(--muted);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.activate-btn{margin-top:34px;padding:14px 38px;font-size:.95rem;letter-spacing:.15em;background:transparent;
  border:1px solid var(--theme);color:var(--theme);border-radius:4px;cursor:pointer;transition:all .25s ease;
  font-family:inherit;text-transform:uppercase;}
.activate-btn:hover{background:var(--theme);color:#04070d;box-shadow:0 0 24px var(--theme);}
.activate-hint{margin-top:14px;font-size:.72rem;color:var(--muted);letter-spacing:.15em;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#settings-toggle-btn{position:fixed;top:calc(10px + env(safe-area-inset-top));right:12px;z-index:50;width:38px;height:38px;border-radius:50%;border:1px solid #23304a;background:var(--panel);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#settings-toggle-btn:hover{border-color:var(--theme);}
#settings-panel{display:flex;flex-direction:column;width:100%;}
#topbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;background:var(--panel);border-bottom:1px solid #182034;flex-shrink:0;width:100%;box-sizing:border-box;}
#topbar input{flex:1 1 160px;min-width:0;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:10px 10px;border-radius:4px;font-size:16px;-webkit-appearance:none;}
#topbar label{font-size:.72rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em;flex:0 0 auto;}
#topbar .sb-btn{flex:0 0 auto;}
@media (max-width:420px){
  #topbar label{flex-basis:100%;}
  #topbar input{flex-basis:100%;}
}
#topbar-openmanus{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:#080b14;border-bottom:1px solid #182034;flex-shrink:0;width:100%;box-sizing:border-box;}
#topbar-openmanus label{font-size:.68rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em;flex:0 0 auto;}
#topbar-openmanus input{flex:1 1 140px;min-width:0;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:8px 10px;border-radius:4px;font-size:16px;-webkit-appearance:none;}
#topbar-openmanus .sb-btn{flex:0 0 auto;}
#topbar-voicebox{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:#080b14;border-bottom:1px solid #182034;flex-shrink:0;width:100%;box-sizing:border-box;}
#topbar-voicebox label{font-size:.68rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em;flex:0 0 auto;}
#topbar-voicebox input[type="text"]{flex:1 1 140px;min-width:0;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:8px 10px;border-radius:4px;font-size:16px;-webkit-appearance:none;}
#topbar-voicebox .sb-btn{flex:0 0 auto;}
#topbar-machine{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:#140808;border-bottom:1px solid #182034;flex-shrink:0;width:100%;box-sizing:border-box;}
#topbar-machine label{font-size:.68rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em;flex:0 0 auto;}
#topbar-machine input[type="text"],#topbar-machine input[type="password"]{flex:1 1 140px;min-width:0;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:8px 10px;border-radius:4px;font-size:16px;-webkit-appearance:none;}
#topbar-machine .sb-btn{flex:0 0 auto;}
#topbar-piper{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 16px;background:#081410;border-bottom:1px solid #182034;flex-shrink:0;width:100%;box-sizing:border-box;}
#topbar-piper label{font-size:.68rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em;flex:0 0 auto;}
#topbar-piper select{flex:1 1 200px;min-width:0;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:8px 10px;border-radius:4px;font-size:16px;}
#topbar-piper .sb-btn{flex:0 0 auto;}
#main-area{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));position:relative;min-height:0;}
.orb-wrap{position:relative;width:min(40vw,210px);height:min(40vw,210px);cursor:pointer;flex-shrink:0;}
.orb{width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #dff4ff, var(--theme) 40%, #04101c 100%);
  box-shadow:0 0 50px var(--theme),0 0 100px rgba(124,58,237,.4);animation:idle-pulse 3s ease-in-out infinite;}
.orb-ring{position:absolute;inset:-14px;border-radius:50%;border:1px solid var(--theme);opacity:.35;}
@keyframes idle-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.orb-wrap.listening .orb{animation:listen-pulse 1s ease-in-out infinite;}
@keyframes listen-pulse{0%,100%{transform:scale(1);box-shadow:0 0 50px var(--theme),0 0 100px rgba(124,58,237,.4);}50%{transform:scale(1.08);box-shadow:0 0 85px var(--theme),0 0 150px rgba(124,58,237,.6);}}
.orb-wrap.thinking .orb{animation:think-pulse .4s ease-in-out infinite;}
@keyframes think-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.orb-wrap.speaking .orb{animation:speak-pulse .6s ease-in-out infinite;}
@keyframes speak-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.assistant-name{margin-top:16px;font-size:1.25rem;letter-spacing:.25em;font-family:'Courier New',monospace;
  background:linear-gradient(90deg,var(--theme),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;text-transform:uppercase;}
.status-lines{margin-top:12px;text-align:center;max-width:640px;padding:0 12px;width:100%;box-sizing:border-box;}
.line-user{color:var(--muted);font-size:.88rem;min-height:1.3em;}
.line-assistant{color:var(--text);font-size:1rem;line-height:1.5;margin-top:6px;white-space:pre-wrap;text-align:left;max-height:34vh;overflow-y:auto;padding:10px 14px;border-radius:8px;background:rgba(47,184,255,0.04);}
.line-assistant:empty{padding:0;background:transparent;min-height:1.3em;}
.status-tag{margin-top:8px;font-size:.68rem;letter-spacing:.2em;color:var(--theme);text-transform:uppercase;}
.controls-row{display:flex;gap:10px;margin-top:14px;align-items:center;}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid #23304a;background:#0a0e18;color:var(--text);cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{border-color:var(--theme);}
.text-input-row{display:flex;gap:8px;margin-top:12px;width:min(90vw,460px);align-items:center;}
.text-input-row input{flex:1;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:9px 12px;border-radius:4px;font-size:16px;-webkit-appearance:none;}
.text-input-row button{background:var(--theme);border:none;color:#04101c;padding:0 16px;border-radius:4px;cursor:pointer;font-weight:600;}
.attach-btn{background:#0a0e18;border:1px solid #23304a;color:var(--text);width:38px;height:38px;border-radius:4px;cursor:pointer;font-size:1rem;flex-shrink:0;}
.attach-btn:hover{border-color:var(--theme);}
.attach-chip{display:none;align-items:center;gap:8px;width:min(90vw,460px);margin-top:8px;background:#0a0e18;border:1px solid #23304a;border-radius:4px;padding:6px 10px;font-size:.78rem;color:var(--muted);}
.attach-chip.active{display:flex;}
.attach-chip button{background:transparent;border:none;color:#ff8a80;cursor:pointer;font-size:.9rem;margin-left:auto;padding:0 4px;}
#second-brain{border-top:1px solid #182034;background:#04060c;padding:12px 16px calc(16px + env(safe-area-inset-bottom));max-height:42vh;display:flex;flex-direction:column;flex-shrink:0;}
.sb-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px;}
.sb-title{font-size:.92rem;font-weight:600;letter-spacing:.05em;}
.sb-subtitle{font-size:.72rem;color:var(--muted);margin-left:8px;}
.sb-count{font-size:.72rem;color:var(--muted);}
.sb-actions{display:flex;gap:6px;align-items:center;}
.sb-btn{background:#0a0e18;border:1px solid #23304a;color:var(--text);width:28px;height:28px;border-radius:4px;cursor:pointer;}
.sb-btn:hover{border-color:var(--theme);}
#graph-container{flex:1;min-height:200px;}
#graph-container svg{width:100%;height:100%;display:block;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px;font-size:.7rem;align-items:center;}
.legend-item{display:flex;align-items:center;gap:5px;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.legend-injected{margin-left:auto;color:#22c55e;}
.node-ring,.core-ring{transform-box:fill-box;transform-origin:center;animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.25;transform:scale(1);}50%{opacity:.55;transform:scale(1.08);}}
.node-group.flash .node{animation:flash-node .4s ease-in-out 3;}
@keyframes flash-node{0%,100%{filter:brightness(1);}50%{filter:brightness(2.2);}}
.error-banner{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#3a0d12;border:1px solid #ff5547;color:#ffb3ad;padding:8px 16px;border-radius:6px;font-size:.82rem;z-index:200;max-width:90vw;}
#note-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;}
.note-modal{background:var(--panel);border:1px solid #23304a;border-radius:8px;padding:20px;width:min(90vw,420px);}
.note-modal h3{margin-bottom:12px;font-size:1rem;}
.note-modal label{font-size:.72rem;color:var(--muted);display:block;margin-top:10px;margin-bottom:4px;}
.note-modal input,.note-modal select,.note-modal textarea{width:100%;background:#0a0e18;border:1px solid #23304a;color:var(--text);padding:8px;border-radius:4px;font-family:inherit;font-size:16px;-webkit-appearance:none;box-sizing:border-box;}
.note-modal textarea{min-height:70px;resize:vertical;}
.note-modal-actions{display:flex;align-items:center;margin-top:16px;gap:8px;}
.note-modal-actions button{padding:8px 14px;border-radius:4px;border:none;cursor:pointer;font-size:.82rem;}
.btn-save{background:var(--theme);color:#04101c;font-weight:600;}
.btn-delete{background:#3a0d12;color:#ff8a80;border:1px solid #ff5547 !important;}
.btn-cancel{background:transparent;color:var(--muted);border:1px solid #23304a !important;}
@media (max-width:600px){#second-brain{max-height:38vh;}}
@media (max-height:700px){
  .orb-wrap{width:min(32vw,150px) !important;height:min(32vw,150px) !important;}
  .assistant-name{margin-top:10px;font-size:1.05rem;}
  .status-lines{margin-top:8px;}
  .controls-row{margin-top:10px;}
  .text-input-row{margin-top:10px;}
  #second-brain{max-height:30vh;}
}
@media (max-height:600px){
  #second-brain{max-height:24vh;}
}
</style>
</head>
<body>
<div id="boot-screen">
  <div class="brand-title" id="boot-title">JARVIS</div>
  <div class="brand-line"></div>
  <div class="sync-text">SINCRONIZANDO DADOS...</div>
  <div class="version-tag">v5.1 · XTTS LOCAL</div>
</div>
<div id="activation-screen" class="hidden">
  <div class="brand-title" id="activation-title">JARVIS</div>
  <button class="activate-btn" id="activate-btn">► ATIVAR SISTEMA</button>
  <div class="activate-hint">CLIQUE PARA INICIAR</div>
</div>
<div id="app" class="hidden">
  <button id="settings-toggle-btn" title="Configurações">⚙️</button>
  <div id="settings-panel" class="hidden">
    <div id="topbar">
      <label for="api-key-input">API KEY (Gemini):</label>
      <input type="password" id="api-key-input" placeholder="AIzaSy..." autocomplete="off">
      <button class="sb-btn" id="save-key-btn" title="Salvar chave">💾</button>
    </div>
    <div id="topbar-openmanus">
      <label for="openmanus-url-input">OpenManus URL:</label>
      <input type="text" id="openmanus-url-input" placeholder="https://seu-usuario-nome.hf.space" autocomplete="off">
      <label for="openmanus-token-input">Token:</label>
      <input type="password" id="openmanus-token-input" placeholder="token" autocomplete="off">
      <button class="sb-btn" id="save-openmanus-btn" title="Salvar configuração do OpenManus">💾</button>
    </div>
    <div id="topbar-voicebox">
      <label for="voicebox-enabled-input" style="display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="voicebox-enabled-input" style="width:auto;">
        Usar Voicebox local (só no PC, app precisa estar aberto)
      </label>
      <label for="voicebox-profile-input">Perfil de voz:</label>
      <input type="text" id="voicebox-profile-input" placeholder="nome do perfil no Voicebox" autocomplete="off">
      <button class="sb-btn" id="save-voicebox-btn" title="Salvar configuração do Voicebox">💾</button>
    </div>
    <div id="topbar-machine">
      <label for="machine-enabled-input" style="display:flex;align-items:center;gap:6px;">
        <input type="checkbox" id="machine-enabled-input" style="width:auto;">
        Controle da máquina (só via servidor local, veja o token no terminal)
      </label>
      <label for="machine-token-input">Token:</label>
      <input type="password" id="machine-token-input" placeholder="cole o token mostrado no terminal" autocomplete="off">
      <button class="sb-btn" id="save-machine-btn" title="Salvar token de controle da máquina">💾</button>
    </div>
    <div id="topbar-piper">
      <label for="piper-voice-select">Voz (qualquer navegador):</label>
      <select id="piper-voice-select">
        <option value="">Padrão do navegador (robótica, instantânea)</option>
        <option value="xtts-local">Jarvis (voz clonada, local — precisa do servidor rodando)</option>
        <option value="pt_BR-faber-medium">Faber (Piper, roda no navegador)</option>
        <option value="pt_BR-cadu-medium">Cadu (Piper, roda no navegador)</option>
        <option value="pt_BR-jeff-medium">Jeff (Piper, roda no navegador)</option>
        <option value="pt_BR-edresson-low">Edresson (Piper, roda no navegador)</option>
        <option value="razo">Razo (experimental, comunidade)</option>
        <option value="gemini-tts">Gemini TTS direto (pode não funcionar no Safari)</option>
        <option value="gemini-tts-server">Gemini TTS via servidor (funciona em qualquer navegador)</option>
      </select>
      <button class="sb-btn" id="save-piper-btn" title="Salvar escolha de voz">💾</button>
    </div>
  </div>
  <div id="main-area">
    <div class="orb-wrap" id="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb"></div>
    </div>
    <div class="assistant-name" id="assistant-name-label"></div>
    <div class="status-lines">
      <div class="line-user" id="line-user"></div>
      <div class="line-assistant" id="line-assistant"></div>
      <div class="status-tag" id="status-tag">OCIOSO</div>
    </div>
    <div class="controls-row">
      <button class="icon-btn" id="mic-btn" title="Microfone">🎤</button>
      <button class="icon-btn" id="stop-btn" title="Interromper fala">⏹</button>
    </div>
    <div class="text-input-row">
      <button class="attach-btn" id="attach-btn" title="Anexar arquivo">📎</button>
      <input type="file" id="file-input" accept="image/*,application/pdf" class="hidden">
      <input type="text" id="text-input" placeholder="ou digite e tecle Enter">
      <button id="text-send-btn">Enviar</button>
    </div>
    <div class="attach-chip" id="attach-chip">
      <span id="attach-chip-name"></span>
      <button id="attach-chip-remove" title="Remover anexo">✕</button>
    </div>
  </div>
  <div id="second-brain">
    <div class="sb-topbar">
      <div><span class="sb-title">🧠 SECOND BRAIN</span><span class="sb-subtitle">memória viva e contexto pessoal</span></div>
      <div class="sb-actions">
        <span class="sb-count" id="sb-count"></span>
        <button class="sb-btn" id="sb-add-btn" title="Nova nota">+</button>
        <button class="sb-btn" id="sb-export-btn" title="Exportar backup">⬇</button>
        <button class="sb-btn" id="sb-import-btn" title="Importar backup">⬆</button>
        <input type="file" id="import-input" accept="application/json" class="hidden">
        <button class="sb-btn" id="sb-reload-btn" title="Recarregar">⟳</button>
      </div>
    </div>
    <div id="graph-container"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<div id="note-modal-backdrop" class="hidden">
  <div class="note-modal">
    <h3 id="note-modal-title">Nova nota</h3>
    <label>Título</label>
    <input type="text" id="note-title-input">
    <label>Área</label>
    <select id="note-area-input"></select>
    <label>Conteúdo</label>
    <textarea id="note-body-input"></textarea>
    <div class="note-modal-actions">
      <button class="btn-delete hidden" id="note-delete-btn">Excluir</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" id="note-cancel-btn">Cancelar</button>
      <button class="btn-save" id="note-save-btn">Salvar</button>
    </div>
  </div>
</div>

function pickVoice(){
  var ptVoices = voices.filter(function(v){ return v.lang && v.lang.toLowerCase().indexOf("pt") === 0; });
  var maleHints = ["male","masc","daniel","felipe","ricardo","masculina","antonio","antônio","fabio","fábio","humberto","julio","júlio","nicolau","valerio","valério","donato","cadu","edresson","faber","jeff","thiago","andré","andre"];
  var femaleHints = ["female","fem","maria","luciana","joana","feminina","heloisa","heloísa","helia","hélia","francisca","brenda","elza","manuela","giovanna","leila","leticia","letícia","yara","thalita"];
  var hints = CONFIG.voiceGender === "feminina" ? femaleHints : maleHints;
  var oppositeHints = CONFIG.voiceGender === "feminina" ? maleHints : femaleHints;
  var match = ptVoices.find(function(v){
    var n = v.name.toLowerCase();
    return hints.some(function(h){ return n.indexOf(h) !== -1; });
  });
  if(match) return match;
  var notOpposite = ptVoices.filter(function(v){
    var n = v.name.toLowerCase();
    return !oppositeHints.some(function(h){ return n.indexOf(h) !== -1; });
  });
  if(notOpposite.length) return notOpposite[0];
  if(ptVoices.length) return ptVoices[0];
  return voices[0] || null;
}
function speakBrowserFallback(text){
  speechSynthesis.cancel();
  busy = true;
  setOrbState("speaking");
  var utter = new SpeechSynthesisUtterance(text);
  utter.lang = "pt-BR";
  utter.rate = 1.08;
  utter.pitch = 1.0;
  if(selectedVoice) utter.voice = selectedVoice;
  utter.onend = function(){
    busy = false;
    setOrbState("idle");
    startListening();
  };
  utter.onerror = function(){
    busy = false;
    setOrbState("idle");
    startListening();
  };
  speechSynthesis.speak(utter);
}

function pcmToWavBlob(pcmFloat32, sampleRate){
  var numSamples = pcmFloat32.length;
  var buffer = new ArrayBuffer(44 + numSamples * 2);
  var view = new DataView(buffer);
  function writeString(offset, str){
    for(var i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i));
  }
  writeString(0, "RIFF");
  view.setUint32(4, 36 + numSamples*2, true);
  writeString(8, "WAVE");
  writeString(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate*2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, "data");
  view.setUint32(40, numSamples*2, true);
  var offset = 44;
  for(var i=0;i<numSamples;i++){
    var s = Math.max(-1, Math.min(1, pcmFloat32[i]));
    view.setInt16(offset, s < 0 ? s*0x8000 : s*0x7FFF, true);
    offset += 2;
  }
  return new Blob([buffer], { type: "audio/wav" });
}
function base64ToArrayBuffer(base64){
  var binary = atob(base64);
  var bytes = new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}
function wrapPcm16AsWav(pcmArrayBuffer, sampleRate){
  var headerBuf = new ArrayBuffer(44);
  var view = new DataView(headerBuf);
  function writeString(offset, str){
    for(var i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i));
  }
  writeString(0, "RIFF");
  view.setUint32(4, 36 + pcmArrayBuffer.byteLength, true);
  writeString(8, "WAVE");
  writeString(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate*2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, "data");
  view.setUint32(40, pcmArrayBuffer.byteLength, true);
  return new Blob([headerBuf, pcmArrayBuffer], { type:"audio/wav" });
}
function speakXTTSLocal(text){
  busy = true;
  setOrbState("speaking");
  var controller = new AbortController();
  var timeoutId = setTimeout(function(){ controller.abort(); }, 60000);
  fetch("http://127.0.0.1:8881/v1/audio/speech", {
    method:"POST",
    headers:{ "content-type":"application/json" },
    body: JSON.stringify({ input:text, response_format:"wav" }),
    signal: controller.signal
  }).then(function(res){
    clearTimeout(timeoutId);
    if(!res.ok) throw new Error("xtts-http-" + res.status);
    return res.blob();
  }).then(function(blob){
    var url = URL.createObjectURL(blob);
    var player = new Audio(url);
    player.onended = function(){
      URL.revokeObjectURL(url);
      busy = false;
      setOrbState("idle");
      startListening();
    };
    player.onerror = function(){
      URL.revokeObjectURL(url);
      speakBrowserFallback(text);
    };
    player.play().catch(function(){ speakBrowserFallback(text); });
  }).catch(function(err){
    clearTimeout(timeoutId);
    console.warn("XTTS local falhou (servidor em http://127.0.0.1:8881 rodando?): " + (err && err.message));
    speakBrowserFallback(text);
  });
}

function speakGeminiTTS(text){
  busy = true;
  setOrbState("speaking");
  var apiKey = "";
  try{
    apiKey = document.getElementById("api-key-input").value.trim() || localStorage.getItem("gemini_api_key") || "";
  }catch(e){}
  if(!apiKey){ speakBrowserFallback(text); return; }
  fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent", {
    method:"POST",
    headers:{ "content-type":"application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify({
      contents: [{ parts: [{ text: "Fale de forma natural, calma e clara, em português do Brasil: " + text }] }],
      generationConfig:{
        responseModalities:["AUDIO"],
        speechConfig:{ voiceConfig:{ prebuiltVoiceConfig:{ voiceName:"Charon" } } }
      }
    })
  }).then(function(res){
    if(!res.ok) throw new Error("gemini-tts-http-" + res.status);
    return res.json();
  }).then(function(data){
    var cand = data.candidates && data.candidates[0];
    var part = cand && cand.content && cand.content.parts && cand.content.parts[0];
    var inline = part && part.inlineData;
    if(!inline || !inline.data) throw new Error("gemini-tts-sem-audio");
    var mimeType = inline.mimeType || "audio/L16;codec=pcm;rate=24000";
    var rateMatch = mimeType.match(/rate=(\d+)/);
    var sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
    var pcmBuffer = base64ToArrayBuffer(inline.data);
    var wavBlob = wrapPcm16AsWav(pcmBuffer, sampleRate);
    var url = URL.createObjectURL(wavBlob);
    var player = new Audio(url);
    player.onended = function(){
      URL.revokeObjectURL(url);
      busy = false;
      setOrbState("idle");
      startListening();
    };
    player.onerror = function(){
      URL.revokeObjectURL(url);
      speakBrowserFallback(text);
    };
    player.play().catch(function(){ speakBrowserFallback(text); });
  }).catch(function(err){
    console.warn("Gemini TTS falhou (" + (err && err.name) + "): " + (err && err.message));
    speakBrowserFallback(text);
  });
}
function speakRazo(text){
  busy = true;
  setOrbState("speaking");
  loadRazoLibs().then(function(mods){
    if(!_razoConfigPromise){
      _razoConfigPromise = fetch(RAZO_CONFIG_URL).then(function(r){ return r.json(); });
    }
    if(!_razoSessionPromise){
      _razoSessionPromise = mods.ort.InferenceSession.create(RAZO_ONNX_URL);
    }
    return Promise.all([_razoConfigPromise, _razoSessionPromise, mods.phonemizer.phonemize(text, "pt-br")])
      .then(function(results){
        var config = results[0];
        var session = results[1];
        var phonemeStrings = results[2];
        var idMap = config.phoneme_id_map;
        var ids = idMap["^"].slice();
        var fullText = phonemeStrings.join(" ");
        for(var i=0;i<fullText.length;i++){
          var ph = fullText[i];
          if(!idMap[ph]) continue;
          ids = ids.concat(idMap[ph]);
          ids = ids.concat(idMap["_"]);
        }
        ids = ids.concat(idMap["$"]);
        var inference = config.inference || {};
        var noiseScale = inference.noise_scale != null ? inference.noise_scale : 0.667;
        var lengthScale = inference.length_scale != null ? inference.length_scale : 1.0;
        var noiseW = inference.noise_w != null ? inference.noise_w : 0.8;
        var sampleRate = (config.audio && config.audio.sample_rate) ? config.audio.sample_rate : 22050;
        var idsBig = new BigInt64Array(ids.map(function(x){ return BigInt(x); }));
        var feeds = {
          input: new mods.ort.Tensor("int64", idsBig, [1, ids.length]),
          input_lengths: new mods.ort.Tensor("int64", new BigInt64Array([BigInt(ids.length)]), [1]),
          scales: new mods.ort.Tensor("float32", new Float32Array([noiseScale, lengthScale, noiseW]), [3])
        };
        return session.run(feeds).then(function(output){
          return pcmToWavBlob(output.output.data, sampleRate);
        });
      });
  }).then(function(wavBlob){
    var url = URL.createObjectURL(wavBlob);
    var player = new Audio(url);
    player.onended = function(){
      URL.revokeObjectURL(url);
      busy = false;
      setOrbState("idle");
      startListening();
    };
    player.onerror = function(){
      URL.revokeObjectURL(url);
      speakBrowserFallback(text);
    };
    player.play().catch(function(){ speakBrowserFallback(text); });
  }).catch(function(err){
    console.warn("Razo TTS falhou, usando voz do navegador: " + (err && err.message ? err.message : String(err)));
    speakBrowserFallback(text);
  });
}

function speak(text){
  if(!text){ startListening(); return; }
  var piperVoiceId = "";
  try{ piperVoiceId = localStorage.getItem("piper_voice_id") || ""; }catch(e){}
  if(piperVoiceId === "xtts-local"){
    speakXTTSLocal(text);
    return;
  }
  if(piperVoiceId === "gemini-tts-server"){
    speakGeminiTTSServer(text);
    return;
  }
  if(piperVoiceId === "gemini-tts"){
    speakGeminiTTS(text);
    return;
  }
  if(piperVoiceId === "razo"){
    speakRazo(text);
    return;
  }
  if(piperVoiceId){
    speakPiper(text, piperVoiceId);
    return;
  }
  var voiceboxEnabled = false;
  var voiceboxProfile = "";
  try{
    voiceboxEnabled = localStorage.getItem("voicebox_enabled") === "1";
    voiceboxProfile = localStorage.getItem("voicebox_profile") || "";
  }catch(e){}
  if(!voiceboxEnabled || !voiceboxProfile){
    speakBrowserFallback(text);
    return;
  }
  busy = true;
  setOrbState("speaking");
  var controller = new AbortController();
  var timeoutId = setTimeout(function(){ controller.abort(); }, 12000);
  fetch("/vb-proxy/speak", {
    method:"POST",
    headers:{ "content-type":"application/json" },
    body: JSON.stringify({ text:text, profile:voiceboxProfile }),
    signal: controller.signal
  }).then(function(res){
    clearTimeout(timeoutId);
    if(!res.ok) throw new Error("voicebox-http-" + res.status);
    var contentType = res.headers.get("content-type") || "";
    if(contentType.indexOf("audio") !== -1){
      return res.blob().then(function(blob){ return { kind:"blob", blob:blob }; });
    }
    return res.json().then(function(data){ return { kind:"json", data:data }; });
  }).then(function(result){
    var audioUrl = null;
    var revoke = false;
    if(result.kind === "blob"){
      audioUrl = URL.createObjectURL(result.blob);
      revoke = true;
    } else {
      var d = result.data || {};
      audioUrl = d.audio_url || d.url || d.audioUrl || null;
      if(!audioUrl && d.audio_base64){
        audioUrl = "data:audio/wav;base64," + d.audio_base64;
      }
    }
    if(!audioUrl) throw new Error("voicebox-sem-audio");
    var player = new Audio(audioUrl);
    player.onended = function(){
      if(revoke) URL.revokeObjectURL(audioUrl);
      busy = false;
      setOrbState("idle");
      startListening();
    };
    player.onerror = function(){
      if(revoke) URL.revokeObjectURL(audioUrl);
      speakBrowserFallback(text);
    };
    player.play().catch(function(){ speakBrowserFallback(text); });
  }).catch(function(){
    clearTimeout(timeoutId);
    speakBrowserFallback(text);
  });
}
function setupRecognition(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    showError("Reconhecimento de voz não é suportado neste navegador.");
    return;
  }
  recognition = new SR();
  recognition.lang = "pt-BR";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onresult = function(event){
    var result = event.results[event.results.length - 1];
    if(!result.isFinal) return;
    var transcript = result[0].transcript.trim();
    if(transcript) handleTranscript(transcript);
  };
  recognition.onerror = function(event){
    if(event.error === "not-allowed" || event.error === "permission-denied"){
      showError("Permissão de microfone negada. Habilite o microfone nas configurações do navegador.");
    }
  };
  recognition.onend = function(){
    recognizing = false;
    if(!busy) startListening();
  };
  startListening();
}
function startListening(){
  if(!recognition || recognizing || busy) return;
  try{
    recognition.start();
    recognizing = true;
    setOrbState("listening");
  }catch(e){
  }
}
function handleTranscript(transcript){
  var norm = normalize(transcript);
  var wake = normalize(CONFIG.wakeWord);
  if(!activated){
    if(norm.indexOf(wake) !== -1){
      var idx = norm.indexOf(wake);
      var after = transcript.slice(idx + CONFIG.wakeWord.length).trim().replace(/^[,.\s]+/, "");
      if(after.length > 2){
        processCommand(after);
      } else {
        activated = true;
        document.getElementById("status-tag").textContent = "AGUARDANDO COMANDO";
      }
    }
  } else {
    activated = false;
    processCommand(transcript);
  }
}

var MAX_ATTACHMENT_BYTES = 4 * 1024 * 1024;
document.getElementById("attach-btn").addEventListener("click", function(){
  document.getElementById("file-input").click();
});
document.getElementById("file-input").addEventListener("change", function(e){
  var file = e.target.files && e.target.files[0];
  e.target.value = "";
  if(!file) return;
  if(file.size > MAX_ATTACHMENT_BYTES){
    showError("Arquivo grande demais (máx. ~4MB). Escolha um menor.");
    return;
  }

async function execTool(name, args){
  try{
    if(name === "buscar_wikipedia"){
      var termo = (args && args.termo) || "";
      var searchUrl = "https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=" + encodeURIComponent(termo) + "&format=json&origin=*";
      var searchRes = await fetch(searchUrl).then(function(r){ return r.json(); });
      var hit = searchRes && searchRes.query && searchRes.query.search && searchRes.query.search[0];
      if(!hit) return { erro:"nada encontrado na Wikipédia para esse termo" };
      var title = hit.title;
      var extractUrl = "https://pt.wikipedia.org/w/api.php?action=query&prop=extracts&exintro&explaintext&titles=" + encodeURIComponent(title) + "&format=json&origin=*";
      var extractRes = await fetch(extractUrl).then(function(r){ return r.json(); });
      var pages = extractRes && extractRes.query && extractRes.query.pages;
      var extract = pages ? pages[Object.keys(pages)[0]].extract : "";
      return { titulo:title, resumo: (extract || "").slice(0, 1500) };
    }
    if(name === "obter_clima"){
      var cidade = (args && args.cidade) || "";
      var geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(cidade) + "&count=1&language=pt&format=json";
      var geoRes = await fetch(geoUrl).then(function(r){ return r.json(); });
      var loc = geoRes && geoRes.results && geoRes.results[0];
      if(!loc) return { erro:"cidade não encontrada" };
      var wUrl = "https://api.open-meteo.com/v1/forecast?latitude=" + loc.latitude + "&longitude=" + loc.longitude + "&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto";
      var wRes = await fetch(wUrl).then(function(r){ return r.json(); });
      var cur = wRes && wRes.current;
      if(!cur) return { erro:"não consegui obter o clima agora" };
      return {
        cidade: loc.name,
        temperatura_celsius: cur.temperature_2m,
        condicao: WEATHER_CODES[cur.weather_code] || "condição desconhecida",
        vento_kmh: cur.wind_speed_10m
      };
    }
    if(name === "calcular"){
      var expr = String((args && args.expressao) || "");
      if(!/^[0-9+\-*/().%\s]+$/.test(expr)) return { erro:"expressão contém caracteres não permitidos" };
      var resultado = Function('"use strict"; return (' + expr + ")")();
      return { resultado: resultado };
    }
    if(name === "data_hora_atual"){
      return { data_hora: new Date().toLocaleString("pt-BR", { timeZone:"America/Sao_Paulo" }) };
    }
    if(name === "acionar_openmanus"){
      var tarefa = (args && args.tarefa) || "";
      var omUrl = "";
      var omToken = "";
      try{
        omUrl = localStorage.getItem("openmanus_url") || "";
        omToken = localStorage.getItem("openmanus_token") || "";
      }catch(e){}
      if(!omUrl){
        return { erro:"o motor OpenManus ainda não foi configurado (falta a URL do servidor)." };
      }
      var controller = new AbortController();
      var timeoutId = setTimeout(function(){ controller.abort(); }, 110000);
      try{
        var omRes = await fetch(omUrl.replace(/\/$/, "") + "/run", {
          method:"POST",
          headers:{ "content-type":"application/json", "x-auth-token": omToken },
          body: JSON.stringify({ task: tarefa }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if(!omRes.ok){
          var errBody = await omRes.json().catch(function(){ return null; });
          return { erro:"o OpenManus retornou erro " + omRes.status + ": " + ((errBody && errBody.detail) || "sem detalhes") };
        }
        var omData = await omRes.json();
        return { resultado: (omData && omData.result) ? omData.result : "tarefa concluída sem retorno de texto." };
      }catch(e){
        clearTimeout(timeoutId);
        if(e && e.name === "AbortError"){
          return { erro:"a tarefa demorou demais e foi cancelada (mais de ~2 minutos). Tente algo mais simples ou específico." };
        }
        return { erro:"não consegui conectar ao servidor do OpenManus: " + (e && e.message ? e.message : "erro de rede") };
      }
    }
    if(name === "executar_comando_sistema" || name === "abrir_aplicativo_ou_arquivo" || name === "listar_pasta" || name === "ler_arquivo_texto" || name === "escrever_arquivo_texto"){
      var machineEnabled = false;
      var machineToken = "";
      try{
        machineEnabled = localStorage.getItem("machine_enabled") === "1";
        machineToken = localStorage.getItem("machine_token") || "";
      }catch(e){}
      if(!machineEnabled || !machineToken){
        return { erro:"o controle de máquina não está ativado ou o token não foi configurado no Jarvis." };
      }
      var headers = { "content-type":"application/json", "x-jarvis-token": machineToken };
      try{
        if(name === "executar_comando_sistema"){
          var r = await fetch("/machine/exec", { method:"POST", headers:headers, body: JSON.stringify({ comando: args.comando || "" }) });
          var d = await r.json();
          if(!r.ok) return { erro: d.erro || ("erro " + r.status) };
          return d;
        }
        if(name === "abrir_aplicativo_ou_arquivo"){
          var r2 = await fetch("/machine/open", { method:"POST", headers:headers, body: JSON.stringify({ alvo: args.alvo || "" }) });
          var d2 = await r2.json();
          if(!r2.ok) return { erro: d2.erro || ("erro " + r2.status) };
          return d2;
        }
        if(name === "listar_pasta"){
          var r3 = await fetch("/machine/list?path=" + encodeURIComponent(args.caminho || "."), { headers:headers });
          var d3 = await r3.json();
          if(!r3.ok) return { erro: d3.erro || ("erro " + r3.status) };
          return d3;
        }
        if(name === "ler_arquivo_texto"){
          var r4 = await fetch("/machine/read?path=" + encodeURIComponent(args.caminho || ""), { headers:headers });
          var d4 = await r4.json();
          if(!r4.ok) return { erro: d4.erro || ("erro " + r4.status) };
          return d4;
        }
        if(name === "escrever_arquivo_texto"){
          var r5 = await fetch("/machine/write", { method:"POST", headers:headers, body: JSON.stringify({ caminho: args.caminho || "", conteudo: args.conteudo || "" }) });
          var d5 = await r5.json();
          if(!r5.ok) return { erro: d5.erro || ("erro " + r5.status) };
          return d5;
        }
      }catch(e){
        return { erro:"não consegui falar com o servidor local de controle: " + (e && e.message ? e.message : "erro de rede") };
      }
    }
    return { erro:"ferramenta desconhecida: " + name };
  }catch(e){
    return { erro: "falha ao executar a ferramenta: " + (e && e.message ? e.message : "erro desconhecido") };
  }
}
function getHubId(){
  if(!notes.length) return null;
  var degree = {};
  rel.forEach(function(pair){ degree[pair[0]] = (degree[pair[0]]||0)+1; degree[pair[1]] = (degree[pair[1]]||0)+1; });
  var best = notes[0].id, bestDeg = -1;
  notes.forEach(function(n){
    var d = degree[n.id] || 0;
    if(d > bestDeg){ bestDeg = d; best = n.id; }
  });
  return best;
}
function handleSaveDirectives(text){
  var re = /\[\[SAVE:([a-z_]+)\|([^|]+)\|([\s\S]+?)\]\]/g;
  var match;
  var flashIds = [];
  while((match = re.exec(text)) !== null){
    var area = match[1];
    var title = match[2].trim();
    var body = match[3].trim();
    var existing = notes.find(function(n){ return n.title.toLowerCase() === title.toLowerCase(); });
    if(existing){
      existing.body = body;
      if(AREA[area]) existing.area = area;
      flashIds.push(existing.id);
    } else {
      var newId = "n" + Date.now() + Math.floor(Math.random()*1000);
      var newNote = { id:newId, area: AREA[area] ? area : "meta", title:title, body:body };
      notes.push(newNote);
      var hub = getHubId();
      if(hub && hub !== newId) rel.push([hub, newId]);
      flashIds.push(newId);
    }
  }
  var cleaned = text.replace(re, "").trim();
  if(flashIds.length){
    persistNotes();
    persistRel();
    renderGraph(flashIds);
  }
  return cleaned;
}

async function callGemini(apiKey, contents){
  var endpoint = "https://generativelanguage.googleapis.com/v1beta/models/" + CONFIG.model + ":generateContent";
  var res = await fetch(endpoint, {
    method:"POST",
    headers:{ "content-type":"application/json", "x-goog-api-key": apiKey },
    body: JSON.stringify({
      contents: contents,
      systemInstruction: { parts: [{ text: buildSystemPrompt() }] },
      tools: [{ functionDeclarations: TOOL_DECLARATIONS }],
      generationConfig: {
        maxOutputTokens: 2048,
        thinkingConfig: { thinkingLevel: "MINIMAL" }
      }
    })
  });
  if(!res.ok){
    var body = await res.json().catch(function(){ return null; });
    var detail = (body && body.error && body.error.message) ? body.error.message : ("status " + res.status);
    var err = new Error("http-" + res.status + ": " + detail);
    err.isHttp = true; err.detail = detail; err.status = res.status;
    throw err;
  }
  return res.json();
}
async function processCommand(userText){
  document.getElementById("line-user").textContent = userText + (pendingAttachment ? " 📎 " + pendingAttachment.name : "");
  document.getElementById("line-assistant").textContent = "";
  busy = true;
  setOrbState("thinking");
  var apiKey = document.getElementById("api-key-input").value.trim();
  if(!apiKey){
    try{ apiKey = localStorage.getItem("gemini_api_key") || ""; }catch(e){}
  }
  if(!apiKey){
    var msg0 = "Preciso que você cole sua chave da API do Google AI Studio pra eu conseguir funcionar.";
    document.getElementById("line-assistant").textContent = msg0;
    speak(msg0);
    return;
  }
  var userParts = [{ text: userText }];
  if(pendingAttachment){
    userParts.push({ inlineData: { mimeType: pendingAttachment.mimeType, data: pendingAttachment.data } });
  }
  clearAttachment();
  if(sessionHistory.length > MAX_HISTORY_TURNS){
    sessionHistory = sessionHistory.slice(sessionHistory.length - MAX_HISTORY_TURNS);
  }
  var loopContents = sessionHistory.map(function(m){ return { role:m.role, parts:m.parts }; });
  loopContents.push({ role:"user", parts:userParts });
  try{
    var finalText = null;
    for(var step = 0; step < MAX_AGENT_STEPS; step++){
      var data = await callGemini(apiKey, loopContents);
      var blockReason = data.promptFeedback && data.promptFeedback.blockReason;
      if(blockReason){
        throw Object.assign(new Error("blocked"), { isContentIssue:true, detail:"Bloqueado por segurança: " + blockReason });
      }
      var cand = data.candidates && data.candidates[0];
      if(cand && cand.finishReason && cand.finishReason !== "STOP" && cand.finishReason !== "MAX_TOKENS"){
        throw Object.assign(new Error("finish-" + cand.finishReason), { isContentIssue:true, detail:"Resposta interrompida: " + cand.finishReason });
      }
      var respParts = (cand && cand.content && cand.content.parts) ? cand.content.parts : [];
      var functionCalls = respParts.filter(function(p){ return p.functionCall; });
      if(functionCalls.length){
        loopContents.push({ role:"model", parts:respParts });
        document.getElementById("status-tag").textContent = "USANDO FERRAMENTA";
        var responseParts = [];
        for(var i=0;i<functionCalls.length;i++){
          var fc = functionCalls[i].functionCall;
          var result = await execTool(fc.name, fc.args || {});
          responseParts.push({ functionResponse: { name: fc.name, response: result } });
        }
        loopContents.push({ role:"function", parts: responseParts });
        setOrbState("thinking");
        continue;
      }
      var text = respParts[0] && respParts[0].text ? respParts[0].text : "";
      if(!text) text = "Desculpa, não recebi uma resposta válida.";
      finalText = text;
      break;
    }
    if(finalText === null){
      finalText = "Essa tarefa ficou grande demais pra eu terminar agora — tenta simplificar o pedido.";
    }
    finalText = handleSaveDirectives(finalText);
    sessionHistory.push({ role:"user", parts:userParts });
    sessionHistory.push({ role:"model", parts:[{ text:finalText }] });
    document.getElementById("line-assistant").textContent = finalText;
    speak(finalText);
  }catch(err){
    var msg;
    if(err && err.status === 429){
      msg = "Bati no limite de uso gratuito da API por agora. Tenta de novo em instantes.";
      showError("Limite de requisições atingido (429).");
    } else if(err && err.isContentIssue){
      msg = "Não posso responder isso por uma política de segurança do modelo.";
      showError(err.detail);
    } else if(err && err.isHttp){
      msg = "Deu erro na chamada da API (" + (err.status || "?") + "). Confere se a chave está certa.";
      showError("Erro da API: " + (err.detail || err.message));
    } else {
      msg = "Não consegui conectar. Verifica sua internet.";
    }
    document.getElementById("line-assistant").textContent = msg;
    speak(msg);
  }
}

function renderGraph(flashIds){

    var d = degree[n.id] || 0;
    var radius = 15 + Math.min(d, 8) * 2.1;
    var color = (AREA[n.area] && AREA[n.area].color) || "#8a90a6";
    return { id:n.id, x:ex, y:ey, r:radius, color:color, title:n.title };
  });
  var nodeById = {};
  graphNodes.forEach(function(n){ nodeById[n.id] = n; });
  graphEdges = rel.filter(function(pair){ return nodeById[pair[0]] && nodeById[pair[1]]; }).map(function(pair){
    var A = nodeById[pair[0]], B = nodeById[pair[1]];
    var mx = (A.x + B.x)/2, my = (A.y + B.y)/2;
    var ctrlX = mx + (cx - mx) * 0.35;
    var ctrlY = my + (cy - my) * 0.35;
    return { ax:A.x, ay:A.y, bx:B.x, by:B.y, cx:ctrlX, cy:ctrlY };
  });
  var parts = [];
  parts.push('<defs>');
  parts.push('<radialGradient id="coreGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#c9b6ff"/><stop offset="45%" stop-color="' + CONFIG.themeColor + '"/><stop offset="100%" stop-color="#3a1f7a"/></radialGradient>');
  parts.push('<linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#2dd4ff"/></linearGradient>');
  parts.push('<filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>');
  parts.push('</defs>');
  graphNodes.forEach(function(n){
    parts.push('<line class="ray" x1="' + cx + '" y1="' + cy + '" x2="' + n.x + '" y2="' + n.y + '" stroke="' + n.color + '" stroke-width="1" opacity="0.18"/>');
  });
  graphEdges.forEach(function(e){
    parts.push('<path class="edge" d="M ' + e.ax + ' ' + e.ay + ' Q ' + e.cx + ' ' + e.cy + ' ' + e.bx + ' ' + e.by + '" fill="none" stroke="url(#edgeGrad)" stroke-width="1.4" opacity="0.55" stroke-dasharray="6 5"/>');
  });
  parts.push('<circle class="core-ring" cx="' + cx + '" cy="' + cy + '" r="46" fill="none" stroke="' + CONFIG.themeColor + '" stroke-width="1" opacity="0.4"/>');
  parts.push('<circle class="core" cx="' + cx + '" cy="' + cy + '" r="34" fill="url(#coreGrad)" filter="url(#glow)"/>');
  parts.push('<text x="' + cx + '" y="' + (cy+8) + '" text-anchor="middle" font-size="24">\u{1F9E0}</text>');
  graphNodes.forEach(function(n){
    var flashClass = flashIds.indexOf(n.id) !== -1 ? " flash" : "";
    parts.push('<g class="node-group' + flashClass + '" data-id="' + n.id + '" style="cursor:pointer;">');
    parts.push('<circle class="node-ring" cx="' + n.x + '" cy="' + n.y + '" r="' + (n.r+6) + '" fill="none" stroke="' + n.color + '" opacity="0.35"/>');
    parts.push('<circle class="node" cx="' + n.x + '" cy="' + n.y + '" r="' + n.r + '" fill="' + n.color + '" filter="url(#glow)"/>');
    parts.push('<text x="' + n.x + '" y="' + (n.y + n.r + 16) + '" text-anchor="middle" font-size="11" fill="#dbe6f5">' + escapeXml(n.title) + '</text>');
    parts.push('</g>');
  });
  var pulseCount = Math.min(12, Math.max(graphEdges.length, 1));
  for(var i=0;i<pulseCount;i++){
    parts.push('<circle class="pulse" data-pi="' + i + '" r="3" fill="#ffffff" opacity="0.9"/>');
  }
  var svgString = '<svg viewBox="0 0 ' + width + ' ' + height + '" xmlns="http://www.w3.org/2000/svg">' + parts.join('') + '</svg>';
  container.innerHTML = svgString;
  container.querySelectorAll(".node-group").forEach(function(g){
    g.addEventListener("click", function(){
      openNoteEditor(g.getAttribute("data-id"));
    });
  });
  pulses = [];
  for(var j=0;j<pulseCount;j++){
    pulses.push({
      edgeIndex: graphEdges.length ? Math.floor(Math.random()*graphEdges.length) : 0,
      t: Math.random(),
      speed: 0.004 + Math.random()*0.006
    });
  }
  renderLegend();
  updateCounter();
  startPulseLoop();
  if(flashIds.length){
    setTimeout(function(){
      container.querySelectorAll(".node-group.flash").forEach(function(g){ g.classList.remove("flash"); });
    }, 1600);
  }
}
function startPulseLoop(){
  if(rafId) cancelAnimationFrame(rafId);
  var container = document.getElementById("graph-container");
  function tick(){
    var pulseEls = container.querySelectorAll(".pulse");
    pulseEls.forEach(function(el, i){
      var p = pulses[i];
      if(!p || !graphEdges.length) return;
      var e = graphEdges[p.edgeIndex];
      p.t += p.speed;
      if(p.t >= 1){
        p.t = 0;
        p.edgeIndex = Math.floor(Math.random()*graphEdges.length);
      }
      var t = p.t, mt = 1 - t;
      var x = mt*mt*e.ax + 2*mt*t*e.cx + t*t*e.bx;
      var y = mt*mt*e.ay + 2*mt*t*e.cy + t*t*e.by;
      var op = Math.sin(t * Math.PI);
      el.setAttribute("cx", x);
      el.setAttribute("cy", y);
      el.setAttribute("opacity", (0.3 + op*0.7).toFixed(2));
    });
    var edgeEls = container.querySelectorAll(".edge");
    var offset = (performance.now()/50) % 22;
    edgeEls.forEach(function(el){ el.setAttribute("stroke-dashoffset", (-offset).toFixed(2)); });
    rafId = requestAnimationFrame(tick);
  }
  tick();
}
function renderLegend(){
  var areasPresent = {};
  notes.forEach(function(n){ areasPresent[n.area] = true; });
  var html = "";
  Object.keys(areasPresent).forEach(function(key){
    var a = AREA[key] || { label:key, color:"#8a90a6" };
    html += '<span class="legend-item"><span class="legend-dot" style="background:' + a.color + '"></span>' + a.label + '</span>';
  });
  html += '<span class="legend-injected">✓ contexto injetado em todos os comandos do ' + CONFIG.name + '</span>';
  document.getElementById("legend").innerHTML = html;
}
function updateCounter(){
  var areasCount = new Set(notes.map(function(n){ return n.area; })).size;
  document.getElementById("sb-count").textContent = notes.length + " notas · " + areasCount + " áreas";
}
function openNoteEditor(id){
  editingNoteId = id;
  var note = id ? notes.find(function(n){ return n.id === id; }) : null;
  document.getElementById("note-modal-title").textContent = note ? "Editar nota" : "Nova nota";
  document.getElementById("note-title-input").value = note ? note.title : "";
  document.getElementById("note-area-input").value = note ? note.area : "meta";
  document.getElementById("note-body-input").value = note ? note.body : "";
  document.getElementById("note-delete-btn").classList.toggle("hidden", !note);
  document.getElementById("note-modal-backdrop").classList.remove("hidden");
}
function closeNoteEditor(){
  document.getElementById("note-modal-backdrop").classList.add("hidden");
  editingNoteId = null;
}
document.getElementById("sb-add-btn").addEventListener("click", function(){ openNoteEditor(null); });
document.getElementById("note-cancel-btn").addEventListener("click", closeNoteEditor);
document.getElementById("sb-reload-btn").addEventListener("click", function(){ renderGraph(); });
document.getElementById("sb-export-btn").addEventListener("click", function(){
  try{
    var payload = JSON.stringify({ notes:notes, rel:rel, exportedAt:new Date().toISOString() }, null, 2);
    var blob = new Blob([payload], { type:"application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "jarvis-backup-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }catch(e){
    showError("Não consegui gerar o backup.");
  }
});
document.getElementById("sb-import-btn").addEventListener("click", function(){
  document.getElementById("import-input").click();
});
document.getElementById("import-input").addEventListener("change", function(e){
  var file = e.target.files && e.target.files[0];
  e.target.value = "";
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var parsed = JSON.parse(reader.result);
      if(!parsed || !Array.isArray(parsed.notes)){
        showError("Arquivo de backup inválido.");
        return;
      }
      if(!window.confirm("Isso vai substituir todas as " + notes.length + " notas atuais por " + parsed.notes.length + " do backup. Continuar?")) return;
      notes = parsed.notes;
      rel = Array.isArray(parsed.rel) ? parsed.rel : [];
      persistNotes(); persistRel();
      renderGraph();
    }catch(e){
      showError("Não consegui ler esse arquivo de backup.");
    }
  };
  reader.readAsText(file);
});
document.getElementById("note-save-btn").addEventListener("click", function(){
  var title = document.getElementById("note-title-input").value.trim();
  var area = document.getElementById("note-area-input").value;
  var body = document.getElementById("note-body-input").value.trim();
  if(!title || !body){ closeNoteEditor(); return; }
  var flashId;
  if(editingNoteId){
    var note = notes.find(function(n){ return n.id === editingNoteId; });
    if(note){ note.title = title; note.area = area; note.body = body; flashId = note.id; }
  } else {
    var newId = "n" + Date.now();
    notes.push({ id:newId, area:area, title:title, body:body });
    var hub = getHubId();
    if(hub && hub !== newId) rel.push([hub, newId]);
    flashId = newId;
  }
  persistNotes(); persistRel();
  closeNoteEditor();
  renderGraph(flashId ? [flashId] : []);
});
document.getElementById("note-delete-btn").addEventListener("click", function(){
  if(!editingNoteId) return;
  var noteToDelete = notes.find(function(n){ return n.id === editingNoteId; });
  var label = noteToDelete ? noteToDelete.title : "esta nota";
  if(!window.confirm("Excluir \"" + label + "\"? Essa ação não pode ser desfeita.")) return;
  notes = notes.filter(function(n){ return n.id !== editingNoteId; });
  rel = rel.filter(function(pair){ return pair[0] !== editingNoteId && pair[1] !== editingNoteId; });
  persistNotes(); persistRel();
  closeNoteEditor();
  renderGraph();
});
})();
</script>
